<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House - Glassroom</title>
    <link rel="stylesheet" href="./googs.css">
</head>
<body>
    <header>
        <label for="dinger"> &#x2630;</label>
        <h1><img src="./photos/logo_square_rounded.svg" alt="google classroom logo">Glassroom</h1>
        <label class="plus" for="sukier"><img src="./photos/plus.png" alt="join class button"></label>
    </header>
    <input type="checkbox" class="dingus" id="dinger">
    <nav>
        <a><img src="./photos/house.png" alt="home icon"><span>Home</span></a>
        <a><img src="./photos/calen.png" alt="calendar icon"><span>Calendar</span></a>
        <p>Classes</p>
        <a><img class="smolrock" src="./photos/rock.png" alt="a rock"><span>Throwing stones - 101</span></a>
        <a><img src="./photos/archive.png" alt="archive icon"><span>Archived Classes</span></a>
        <a><img src="./photos/settign.png" alt="settings icon"><span>Settings</span></a>
    </nav> 
    <main>
        <article>
            <div><img src="./photos/rock.png" alt="a rock"></div>
            <h2>Throwing Stones - 101</h2>
            <h3>Prof. G. Herbert</h3>
        </article>
        <article>
            <div><img src="./photos/looking glass.png" alt="a rock"></div>
            <h2>Through the looking</h2>
            <h3>Dr. Alice</h3>
        </article>
        <article>
            <div><img src="./photos/bones.png" alt="a rock"></div>
            <h2>Bones</h2>
            <h3>Prof. S. Ton</h3>
        </article>
        <article>
            <div><img src="./photos/class.png" alt="a rock"></div>
            <h2>Temper</h2>
            <h3>Prof. Ann Gerry</h3>
        </article>
        <article>
            <div><img src="./photos/sugar.png" alt="a rock"></div>
            <h2>Sugar Art</h2>
            <h3>Dr. Punty Marvers</h3>
        </article>
        <input type="checkbox" class="suker" id="sukier">
        <div class="screencover">
            <div>
                <div>
                    <p>Input Glass Code Here</p>
                    <input type="text" placeholder="Class Code">    
                </div>
                <div class="buttons">
                    <label for="sukier" class="confirm">Confirm</label>
                    <label for="sukier" class="cancel">Cancel</label>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
